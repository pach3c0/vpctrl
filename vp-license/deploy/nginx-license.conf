# Nginx configuration for license.cliquezoom.com.br
# Place in /etc/nginx/sites-available/license.cliquezoom.com.br
# Then: ln -s /etc/nginx/sites-available/license.cliquezoom.com.br /etc/nginx/sites-enabled/
# After: certbot --nginx -d license.cliquezoom.com.br

server {
    listen 80;
    server_name license.cliquezoom.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name license.cliquezoom.com.br;

    # SSL — filled by certbot
    # ssl_certificate     /etc/letsencrypt/live/license.cliquezoom.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/license.cliquezoom.com.br/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Rate limit (additional layer on top of slowapi)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req zone=api_limit burst=10 nodelay;

    location / {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # Slightly higher limit for activate (first-time setup, may be slow)
    location /api/v1/licenses/activate {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Serve portal static directly (optional optimization)
    location /portal/ {
        alias /var/www/vp-license/portal/;
        try_files $uri $uri/ /portal/index.html;
    }

    access_log  /var/log/nginx/vp-license-access.log;
    error_log   /var/log/nginx/vp-license-error.log;
}
